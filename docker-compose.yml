services:
  lossless-stream:
    build: .
    container_name: lossless-stream

    # Host networking is required for ALSA device access on Linux.
    network_mode: host

    # Required for ALSA device access inside the container.
    privileged: true
    userns_mode: host

    # Restart automatically on failure or reboot.
    restart: always

    environment:
      # ALSA capture device — find yours with: arecord -l
      # hw:0,0 = first card, first device. USB devices are usually hw:1,0 or higher.
      - ALSA_DEVICE=${ALSA_DEVICE:-hw:0,0}

      # Audio capture format
      - SAMPLE_RATE=${SAMPLE_RATE:-48000}
      - CHANNELS=${CHANNELS:-2}
      - BIT_DEPTH=${BIT_DEPTH:-24}

      # HTTP relay settings
      # Stream URL will be: http://<host>:<RELAY_PORT>/<MOUNT_POINT>
      - RELAY_PORT=${RELAY_PORT:-8100}
      - MOUNT_POINT=${MOUNT_POINT:-live.flac}

      # Stream metadata (shown in logs)
      - STREAM_NAME=${STREAM_NAME:-Turntable}

      # Chunk size for broadcasting to clients (bytes)
      - CHUNK_SIZE=${CHUNK_SIZE:-4096}

      # ffmpeg thread queue size (increase if you see overrun warnings)
      - THREAD_QUEUE_SIZE=${THREAD_QUEUE_SIZE:-4096}

    volumes:
      # Pass through ALSA sound devices
      - /dev/snd:/dev/snd

      # ALSA configuration (read-only)
      - /usr/share/alsa:/usr/share/alsa:ro

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${RELAY_PORT:-8100}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
